<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tavuk Gezegeni — Menü</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #F5C518;
      --gold-dim:   #c9a000;
      --red:        #FF1E1E;
      --bg:         #0e0e0e;
      --bg2:        #161616;
      --bg3:        #1f1f1f;
      --card:       #181818;
      --border:     #2a2a2a;
      --border2:    #333;
      --text:       #f2f2f2;
      --muted:      #888;
      --radius:     14px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOADER ── */
    #loader {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity .5s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }

    .loader-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 4px;
      color: var(--gold);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .chicken-walk {
      width: 88px;
      animation: waddle 1.8s ease-in-out infinite alternate;
    }
    @keyframes waddle {
      from { transform: translateX(-28px); }
      to   { transform: translateX(28px); }
    }
    .chicken-walk .body  { animation: bob   .38s ease-in-out infinite alternate; transform-origin: 50px 56px; }
    .chicken-walk .ll    { animation: leg-l .38s ease-in-out infinite alternate; transform-origin: 40px 66px; }
    .chicken-walk .lr    { animation: leg-r .38s ease-in-out infinite alternate; transform-origin: 54px 66px; }
    @keyframes bob   { from{transform:translateY(0)}  to{transform:translateY(-4px)} }
    @keyframes leg-l { from{transform:rotate(-22deg)} to{transform:rotate(22deg)} }
    @keyframes leg-r { from{transform:rotate(22deg)}  to{transform:rotate(-22deg)} }

    .dots { display:flex; gap:5px; }
    .dots span {
      width:7px; height:7px;
      background: var(--gold);
      border-radius: 50%;
      animation: dbounce .9s ease-in-out infinite;
    }
    .dots span:nth-child(2){ animation-delay:.14s }
    .dots span:nth-child(3){ animation-delay:.28s }
    @keyframes dbounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }

    /* ── HEADER ── */
    header {
      padding: 32px 20px 22px;
      text-align: center;
      background: linear-gradient(180deg, #080808 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border2);
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 50%;
      transform: translateX(-50%);
      width: 80px; height: 2px;
      background: var(--gold);
      border-radius: 2px;
    }
    .header-logo {
      width: 90px; height: 90px;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(245,197,24,.5));
      margin-bottom: 12px;
    }
    .header-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 6vw, 2.2rem);
      letter-spacing: 3px;
      color: var(--text);
      line-height: 1;
    }
    .header-tagline {
      margin-top: 6px;
      font-size: clamp(0.75rem, 3vw, 0.88rem);
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .header-tagline em { color: var(--gold); font-style: normal; }

    /* ── STICKY BAR (search + cats) ── */
    .sticky-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
    }

    /* search */
    .search-row {
      max-width: 700px;
      margin: 0 auto 10px;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 0 14px;
      transition: border-color .2s;
    }
    .search-box:focus-within { border-color: var(--gold); }
    .search-box svg { color: var(--muted); flex-shrink: 0; }
    #searchInput {
      flex: 1;
      background: none; border: none; outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      padding: 11px 0;
    }
    #searchInput::placeholder { color: var(--muted); }
    #clearSearch {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1rem; display: none;
      line-height: 1; padding: 0;
    }
    #clearSearch.on { display: block; }

    /* category tabs */
    .cats-scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      max-width: 700px;
      margin: 0 auto;
    }
    .cats-scroll::-webkit-scrollbar { display: none; }

    .cat-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 6px 14px;
      cursor: pointer;
      transition: all .18s;
      letter-spacing: .3px;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .cat-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
    .cat-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #111;
    }

    /* ── SECTION HEADER ── */
    .section-head {
      max-width: 700px;
      margin: 24px auto 8px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-head h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.3rem, 5vw, 1.7rem);
      letter-spacing: 2px;
      color: var(--text);
      line-height: 1;
    }
    .section-head-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border2), transparent);
    }

    /* ── MENU LIST ── */
    #menuList {
      max-width: 700px;
      margin: 0 auto;
      padding: 4px 12px 48px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── CARD ── */
    .menu-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: stretch;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .18s, box-shadow .18s, transform .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-card:hover {
      border-color: var(--border2);
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      transform: translateY(-1px);
    }
    .menu-card:active { transform: scale(.98); }

    .card-thumb {
      flex-shrink: 0;
      width: 108px;
      background: var(--bg3);
      overflow: hidden;
    }
    @media(min-width:480px){ .card-thumb { width:128px; } }

    .card-thumb img {
      width:100%; height:100%;
      object-fit: cover; display: block;
      transition: transform .35s;
    }
    .menu-card:hover .card-thumb img { transform: scale(1.07); }

    .card-thumb-placeholder {
      width:100%; height:100%; min-height:92px;
      display:flex; align-items:center; justify-content:center;
      font-size: 1.8rem; color: var(--border2);
    }

    .card-body {
      flex: 1;
      padding: 13px 14px 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 6px;
    }
    .card-name {
      font-weight: 700;
      font-size: clamp(0.95rem, 3.2vw, 1.1rem);
      color: var(--text);
      line-height: 1.25;
    }
    .card-desc {
      font-size: 0.76rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .card-foot {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .card-price {
      background: var(--gold);
      color: #111;
      font-weight: 800;
      font-size: 0.88rem;
      padding: 4px 13px;
      border-radius: 6px;
      letter-spacing: .3px;
    }

    /* ── EMPTY STATE ── */
    #emptyState {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 20px;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      font-size: .9rem;
    }
    #emptyState.on { display: flex; }

    /* ── ERROR ── */
    #errorBanner {
      display: none;
      background: #2a0a0a;
      border: 1px solid #7a1a1a;
      color: #ff8888;
      font-size: .82rem;
      text-align: center;
      padding: 10px 16px;
      border-radius: 8px;
      max-width: 700px;
      margin: 12px auto;
    }
    #errorBanner.on { display: block; }

    /* ── MODAL ── */
    #modal {
      display: none;
      position: fixed; inset: 0;
      z-index: 1000;
      padding: 16px;
      align-items: center;
      justify-content: center;
    }
    #modal.open { display: flex; }

    .modal-bg {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
    }
    .modal-box {
      position: relative; z-index: 1;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 18px;
      width: 100%; max-width: 400px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.8);
      animation: pop .2s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes pop {
      from { opacity:0; transform:scale(.88) translateY(16px); }
      to   { opacity:1; transform:scale(1)   translateY(0); }
    }
    .modal-img {
      width:100%; aspect-ratio:4/3;
      background: var(--bg3); overflow: hidden;
    }
    .modal-img img { width:100%; height:100%; object-fit:cover; display:block; }
    .modal-img-ph  { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:3.5rem; }

    .modal-close {
      position: absolute; top:11px; right:11px;
      width:34px; height:34px;
      background: rgba(0,0,0,.65);
      border: none; border-radius: 50%;
      color: #fff; font-size:1rem;
      display:flex; align-items:center; justify-content:center;
      cursor: pointer; z-index: 2;
      transition: background .18s;
    }
    .modal-close:hover { background: var(--red); }

    .modal-body {
      padding: 18px 20px 22px;
      display: flex; flex-direction: column; gap: 7px;
    }
    .modal-cat {
      font-size: .68rem; font-weight: 700;
      color: var(--gold-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .modal-name {
      font-weight: 800;
      font-size: clamp(1.1rem, 5vw, 1.35rem);
      line-height: 1.2;
    }
    .modal-desc {
      font-size: .83rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .modal-price {
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--gold);
      margin-top: 2px;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 20px 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: .73rem;
      letter-spacing: .5px;
    }
    footer strong { color: var(--gold); font-weight:700; }
  </style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <svg class="chicken-walk" viewBox="0 0 90 82" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse class="body" cx="49" cy="50" rx="21" ry="17" fill="#F5C518"/>
    <ellipse cx="49" cy="50" rx="13" ry="9" fill="#e0b000" transform="rotate(-8 49 50)"/>
    <circle cx="70" cy="32" r="13" fill="#F5C518"/>
    <polygon points="81,32 87,29 87,35" fill="#e05a00"/>
    <circle cx="74" cy="28" r="2.4" fill="#111"/>
    <circle cx="75" cy="27" r=".9" fill="#fff"/>
    <ellipse cx="69" cy="20" rx="4" ry="5" fill="#D62B2B"/>
    <ellipse cx="73" cy="18" rx="3" ry="4" fill="#D62B2B"/>
    <ellipse cx="77" cy="36" rx="3" ry="3.5" fill="#D62B2B"/>
    <rect x="61" y="37" width="9" height="9" rx="3.5" fill="#F5C518"/>
    <ellipse cx="28" cy="40" rx="10" ry="5" fill="#e0b000" transform="rotate(-30 28 40)"/>
    <ellipse cx="24" cy="44" rx="9" ry="4" fill="#c89a00" transform="rotate(-45 24 44)"/>
    <line class="ll" x1="42" y1="66" x2="35" y2="76" stroke="#e05a00" stroke-width="3.2" stroke-linecap="round"/>
    <line class="lr" x1="54" y1="66" x2="61" y2="76" stroke="#e05a00" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="35" y1="76" x2="29" y2="78" stroke="#e05a00" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="35" y1="76" x2="35" y2="81" stroke="#e05a00" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="61" y1="76" x2="67" y2="78" stroke="#e05a00" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="61" y1="76" x2="61" y2="81" stroke="#e05a00" stroke-width="2.4" stroke-linecap="round"/>
  </svg>
  <p class="loader-label">Menü Yükleniyor</p>
  <div class="dots"><span></span><span></span><span></span></div>
</div>

<!-- HEADER -->
<header>
  <img src="logo.png" alt="Tavuk Gezegeni" class="header-logo" />
  <p class="header-brand">Tavuk Gezegeni</p>
  <p class="header-tagline">Tavuğun En <em>Lezzetli</em> Hali</p>
</header>

<!-- STICKY BAR -->
<div class="sticky-bar">
  <div class="search-row">
    <div class="search-box">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="searchInput" placeholder="Ürün ara..." autocomplete="off" />
      <button id="clearSearch" aria-label="Temizle">✕</button>
    </div>
  </div>
  <div class="cats-scroll" id="categoryBar"></div>
</div>

<!-- ERROR -->
<div id="errorBanner"></div>

<!-- MENU -->
<main>
  <div id="menuList"></div>
  <div id="emptyState">
    <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" opacity=".4">
      <path d="M9.172 16.172a4 4 0 0 1 5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
    </svg>
    <p>Ürün bulunamadı.</p>
  </div>
</main>

<!-- MODAL -->
<div id="modal" role="dialog" aria-modal="true">
  <div class="modal-bg" id="modalBg"></div>
  <div class="modal-box">
    <div class="modal-img" id="modalImg"></div>
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-body">
      <span class="modal-cat"  id="modalCat"></span>
      <h2  class="modal-name"  id="modalName"></h2>
      <p   class="modal-desc"  id="modalDesc"></p>
      <p   class="modal-price" id="modalPrice"></p>
    </div>
  </div>
</div>

<footer>
  &copy; 2025 &nbsp;<strong>Tavuk Gezegeni</strong>&nbsp; — Ereğli'nin Eşsiz Lezzeti
</footer>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQg67VFP9E9DB905ByOYQL9Xd_Jflr_Ij_PEl6LFyabi2EE5iz9rs5BPqTVYDbwSX4UE1wxxTCDOL19/pub?output=csv';

let allItems = [];
let activeCat = 'Tümü';
let query = '';

/* ── CSV ── */
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = splitRow(lines[0]).map(h => h.trim().toLocaleLowerCase('tr-TR'));
  const iName  = col(headers, ['ürün adı','isim','name','ürün']);
  const iDesc  = col(headers, ['açıklama','aciklama','description','desc','not']);
  const iPrice = col(headers, ['fiyatı','fiyat','price','tutar']);
  const iCat   = col(headers, ['kategorisi','kategori','category','cat']);
  const iImg   = col(headers, ['resim','image','img','foto','görsel']);
  return lines.slice(1).map(line => {
    const c = splitRow(line);
    const name = clean(c[iName]);
    if (!name) return null;
    const category = clean(c[iCat]) || 'Diğer';
    let desc = clean(c[iDesc]) || '';
    if (!desc && category === 'Tavuklar') desc = 'Makarna ve Salata ile servis edilir.';
    return { name, desc, price: clean(c[iPrice]) || '', category, image: clean(c[iImg]) || '' };
  }).filter(Boolean);
}
function col(headers, candidates) {
  for (const c of candidates) { const i = headers.indexOf(c); if (i !== -1) return i; }
  return -1;
}
function clean(v) {
  if (v == null) return '';
  return String(v).trim().replace(/^["']|["']$/g, '');
}
function splitRow(row) {
  const out = []; let cur = '', q = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"') { if (q && row[i+1] === '"') { cur += '"'; i++; } else q = !q; }
    else if (ch === ',' && !q) { out.push(cur); cur = ''; }
    else cur += ch;
  }
  out.push(cur);
  return out;
}

/* ── PRICE ── */
function price(raw) {
  if (!raw) return '';
  const c = raw.trim().replace(/\s*TRY\s*$/i, '').trim();
  if (/₺/.test(c)) return c;
  if (/TL$/i.test(c)) return c.replace(/TL$/i, '').trim() + ' ₺';
  const n = parseFloat(c.replace(',', '.'));
  return isNaN(n) ? raw : n.toLocaleString('tr-TR') + ' ₺';
}

/* ── ESC ── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── THUMB ── */
function thumb(src, alt, ph) {
  if (src) return `<img src="${esc(src)}" alt="${esc(alt)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'${ph}\\'>🍗</div>'"/>`;
  return `<div class="${ph}">🍗</div>`;
}

/* ── CATEGORIES ── */
function buildCats(items) {
  const cats = ['Tümü', ...new Set(items.map(i => i.category))];
  const bar = document.getElementById('categoryBar');
  bar.innerHTML = cats.map(c =>
    `<button class="cat-btn${c === activeCat ? ' active' : ''}" data-cat="${esc(c)}">${esc(c)}</button>`
  ).join('');
  bar.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCat = btn.dataset.cat;
      bar.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });
  });
}

/* ── RENDER ── */
function render() {
  const list  = document.getElementById('menuList');
  const empty = document.getElementById('emptyState');

  let items = allItems;
  if (activeCat !== 'Tümü') items = items.filter(i => i.category === activeCat);
  if (query) {
    const q = query.toLocaleLowerCase('tr-TR');
    items = items.filter(i =>
      i.name.toLocaleLowerCase('tr-TR').includes(q) ||
      i.desc.toLocaleLowerCase('tr-TR').includes(q)
    );
  }

  if (!items.length) { list.innerHTML = ''; empty.classList.add('on'); return; }
  empty.classList.remove('on');

  const showGroups = activeCat === 'Tümü' && !query;
  let html = '';

  if (showGroups) {
    const groups = {};
    items.forEach(item => { (groups[item.category] = groups[item.category] || []).push(item); });
    for (const [cat, catItems] of Object.entries(groups)) {
      html += `<div class="section-head"><h2>${esc(cat)}</h2><div class="section-head-line"></div></div>`;
      catItems.forEach(item => { html += card(item, allItems.indexOf(item)); });
    }
  } else {
    items.forEach(item => { html += card(item, allItems.indexOf(item)); });
  }

  list.innerHTML = html;
  list.querySelectorAll('.menu-card').forEach(el => {
    el.addEventListener('click', () => openModal(+el.dataset.idx));
  });
}

function card(item, idx) {
  const p = price(item.price);
  return `
  <div class="menu-card" data-idx="${idx}" role="button" tabindex="0">
    <div class="card-thumb">${thumb(item.image, item.name, 'card-thumb-placeholder')}</div>
    <div class="card-body">
      <div>
        <p class="card-name">${esc(item.name)}</p>
        ${item.desc ? `<p class="card-desc">${esc(item.desc)}</p>` : ''}
      </div>
      <div class="card-foot">
        ${p ? `<span class="card-price">${esc(p)}</span>` : ''}
      </div>
    </div>
  </div>`;
}

/* ── MODAL ── */
function openModal(idx) {
  const item = allItems[idx];
  if (!item) return;
  const imgWrap = document.getElementById('modalImg');
  imgWrap.innerHTML = item.image
    ? `<img src="${esc(item.image)}" alt="${esc(item.name)}" onerror="this.parentElement.innerHTML='<div class=\\'modal-img-ph\\'>🍗</div>'"/>`
    : `<div class="modal-img-ph">🍗</div>`;
  document.getElementById('modalCat').textContent   = item.category;
  document.getElementById('modalName').textContent  = item.name;
  document.getElementById('modalDesc').textContent  = item.desc || '';
  document.getElementById('modalPrice').textContent = price(item.price);
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalBg').addEventListener('click', closeModal);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ── SEARCH ── */
const inp  = document.getElementById('searchInput');
const clrB = document.getElementById('clearSearch');
inp.addEventListener('input', () => {
  query = inp.value.trim();
  clrB.classList.toggle('on', query.length > 0);
  if (query) {
    activeCat = 'Tümü';
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === 'Tümü'));
  }
  render();
});
clrB.addEventListener('click', () => {
  inp.value = ''; query = '';
  clrB.classList.remove('on');
  render(); inp.focus();
});

/* ── LOAD ── */
async function loadMenu() {
  const loader = document.getElementById('loader');
  const err    = document.getElementById('errorBanner');
  try {
    const r = await fetch(CSV_URL + '&t=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const text = await r.text();
    allItems = parseCSV(text);
    if (!allItems.length) throw new Error('Boş');
    buildCats(allItems);
    render();
    setTimeout(() => loader.classList.add('hidden'), 600);
  } catch(e) {
    console.error(e);
    err.textContent = '⚠️ Menü yüklenirken sorun oluştu. Lütfen sayfayı yenileyin.';
    err.classList.add('on');
    setTimeout(() => loader.classList.add('hidden'), 600);
  }
}
loadMenu();
</script>
